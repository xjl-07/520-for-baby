<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>给宝贝的520 | 我们的故事 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;background:#2a0a1a;color:#fff;overflow-x:hidden;cursor:default}

/* Three.js 3D 画布 */
#threeCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}

/* 2D 叠加层：鼠标爱心 + 开场 */
#overlayCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9997;pointer-events:none}

/* 弹幕层 */
#danmaku-container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9996;pointer-events:none;overflow:hidden}
.danmaku-item{
  position:absolute;
  white-space:nowrap;
  font-size:15px;
  font-weight:300;
  letter-spacing:1px;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(255,130,200,0.06);
  border:1px solid rgba(255,150,210,0.15);
  backdrop-filter:blur(4px);
  color:rgba(255,220,235,0.45);
  text-shadow:0 0 8px rgba(255,100,170,0.2);
  animation:danmaku-move linear forwards;
  pointer-events:none;
}
@keyframes danmaku-move{
  from{transform: translateX(0)}
  to{transform: translateX(calc(-100vw - 100%))}
}

/* 开场 */
#opening{position:fixed;top:0;left:0;width:100vw;height:100vh;background:radial-gradient(ellipse at 50% 60%,#4d1a35 0%,#2a0a1a 70%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.4s ease,transform 1.4s ease}
#opening.hidden{opacity:0;transform: scale(1.08);pointer-events:none}
#heartCanvas{width:100vw;height:60vh}
#opening-title{font-size:clamp(24px,5vw,48px);font-weight:300;letter-spacing:8px;color:rgba(255,180,220,0.92);margin-top:20px;opacity:0;animation:fadeInUp 1.5s ease 2.5s forwards}
#opening-hint{font-size:14px;color:rgba(255,180,220,0.5);margin-top:30px;opacity:0;animation:fadeInUp 1s ease 3.5s forwards,pulse 2s ease 4.5s infinite}
@keyframes fadeInUp{from{opacity:0;transform: translateY(20px)}to{opacity:1;transform: translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.45}50%{opacity:1}}

/* 主内容 */
.main-content{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:60px 20px;opacity:0;transform: translateY(30px)}
.main-content.visible{opacity:1;transform: translateY(0);transition:opacity 1s ease,transform 1s ease}
.section-title{text-align:center;margin:80px 0 50px}
.section-title h2{font-size:clamp(28px,5vw,42px);font-weight:300;background:linear-gradient(135deg,#ff6eb4,#ffb4dc,#ff9ed5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
.section-title .line{width:60px;height:2px;background:linear-gradient(90deg,transparent,#ff6eb4,transparent);margin:15px auto 0}

/* 时间线 */
.timeline{position:relative;padding:20px 0}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,#ff6eb4 20%,#ff6eb4 80%,transparent);transform: translateX(-50%)}
.timeline-item{position:relative;width:50%;padding:20px 40px;opacity:0;transform: translateY(40px);transition:all 0.8s cubic-bezier(0.16,1,0.3,1)}
.timeline-item.visible{opacity:1;transform: translateY(0)}
.timeline-item:nth-child(odd){left:0;text-align:right;padding-right:60px}
.timeline-item:nth-child(even){left:50%;text-align:left;padding-left:60px}
.timeline-dot{position:absolute;top:30px;width:16px;height:16px;background:#ff6eb4;border-radius:50%;box-shadow:0 0 20px rgba(255,110,180,0.7);z-index:2}
.timeline-item:nth-child(odd) .timeline-dot{right:-8px}
.timeline-item:nth-child(even) .timeline-dot{left:-8px}
.timeline-date{font-size:13px;color:rgba(255,180,220,0.7);letter-spacing:2px;margin-bottom:8px}
.timeline-card{background:rgba(255,180,220,0.10);border:1px solid rgba(255,130,200,0.30);border-radius:16px;padding:20px;backdrop-filter:blur(12px);transition:transform 0.3s ease,box-shadow 0.3s ease}
.timeline-card:hover{transform: translateY(-4px);box-shadow:0 8px 32px rgba(255,110,180,0.2)}
.timeline-card .photo{width:100%;height:250px;border-radius:12px;margin-bottom:12px;overflow:hidden;background:rgba(255,110,180,0.08);display:flex;align-items:center;justify-content:center}
.timeline-card .photo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.timeline-card .words{font-size:15px;line-height:1.85;color:rgba(255,220,235,0.92);font-weight:300;min-height:60px}

/* 相册 */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px 0}
.gallery-item{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:1;background:rgba(255,110,180,0.08);cursor:pointer;opacity:0;transform: translateY(30px) scale(0.95);transition:all 0.6s cubic-bezier(0.16,1,0.3,1)}
.gallery-item.visible{opacity:1;transform: translateY(0) scale(1)}
.gallery-item:hover{transform: scale(1.03)!important;box-shadow:0 10px 40px rgba(255,110,180,0.35);z-index:10}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease}
.gallery-item:hover img{transform: scale(1.08)}
.gallery-item .overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 15px 15px;background:linear-gradient(transparent,rgba(120,20,80,0.85));opacity:0;transition:opacity 0.3s ease}
.gallery-item:hover .overlay{opacity:1}
.gallery-item .caption{font-size:13px;color:rgba(255,220,235,0.9)}

/* 结尾 */
.ending{text-align:center;padding:100px 20px;opacity:0;transform: translateY(30px);transition:all 1s ease}
.ending.visible{opacity:1;transform: translateY(0)}
.ending .heart-icon{font-size:48px;margin-bottom:20px;display:inline-block;animation:heartbeat 1.5s ease infinite}
@keyframes heartbeat{0%,100%{transform: scale(1)}15%{transform: scale(1.18)}30%{transform: scale(1)}45%{transform: scale(1.1)}}
.ending h3{font-size:clamp(22px,4vw,32px);font-weight:300;color:rgba(255,180,220,0.9);margin-bottom:10px}
.ending .from{font-size:16px;color:rgba(255,180,220,0.6);letter-spacing:3px}
.ending .date{font-size:14px;color:rgba(255,180,220,0.4);margin-top:8px}

/* 音乐按钮 */
#music-btn{position:fixed;bottom:30px;right:30px;z-index:200;width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,130,200,0.5);background:rgba(100,20,60,0.90);backdrop-filter:blur(10px);color:#ff85c8;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease}
#music-btn:hover{background:rgba(255,110,180,0.2);transform: scale(1.1)}
#music-btn.playing{animation:spin 3s linear infinite}
@keyframes spin{to{transform: rotate(360deg)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,110,180,0.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,110,180,0.5)}

/* 灯箱 */
.lightbox{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(50,5,30,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s ease}
.lightbox.active{opacity:1;pointer-events:auto}
.lb-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:12px;box-shadow:0 0 80px rgba(255,130,200,0.5);transform: scale(0.9);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),opacity 0.3s ease}
.lightbox.active .lb-img{transform: scale(1)}
.lb-close{position:absolute;top:20px;right:30px;font-size:40px;color:rgba(255,180,220,0.8);cursor:pointer;z-index:2;transition:color 0.2s}
.lb-close:hover{color:#fff}
.lb-prev,.lb-next{position:absolute;top:50%;transform: translateY(-50%);font-size:36px;color:rgba(255,180,220,0.7);cursor:pointer;padding:20px;z-index:2;user-select:none;transition:color 0.2s}
.lb-prev{left:10px}.lb-next{right:10px}
.lb-prev:hover,.lb-next:hover{color:#fff}
.lb-caption{position:absolute;bottom:30px;left:0;right:0;text-align:center;font-size:15px;color:rgba(255,220,235,0.85);letter-spacing:2px}
.gallery-item,.timeline-card .photo{cursor:pointer}
.gallery-item:hover,.timeline-card .photo:hover{outline:2px solid rgba(255,110,180,0.5);outline-offset:2px}

@media(max-width:768px){
  .lb-prev,.lb-next{font-size:28px;padding:12px}
  .lb-close{font-size:32px;top:12px;right:18px}
  .lb-caption{font-size:13px;bottom:18px}

  /* 手机时间线改为左侧单列 */
  .timeline::before{left:20px}
  .timeline-item{width:100%!important;left:0!important;text-align:left!important;padding:10px 10px 10px 50px!important}
  .timeline-dot{left:12px!important;right:auto!important}
  .timeline-card .photo{height:200px}

  /* 手机相册两列 */
  .gallery{grid-template-columns:repeat(2,1fr);gap:12px}
  .gallery-item{border-radius:12px}
  .gallery-item .overlay{padding:30px 10px 10px}

  /* 手机音乐按钮位置 */
  #music-btn{bottom:20px;right:20px;width:44px;height:44px;font-size:20px}
}

/* ===== 气球 ===== */
.balloon {
  position: fixed;
  bottom: -120px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  z-index: 9995;
  pointer-events: none;
  animation: balloon-rise ease-in-out forwards;
}
.balloon::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 20px;
  background: rgba(255,150,200,0.4);
}
@keyframes balloon-rise {
  0%   { transform: translateY(0) rotate(0deg);     opacity: 0.8; }
  25%  { transform: translateY(-25vh) rotate(5deg); opacity: 0.8; }
  50%  { transform: translateY(-55vh) rotate(-4deg); }
  75%  { transform: translateY(-85vh) rotate(3deg);  opacity: 0.5; }
  100% { transform: translateY(-125vh) rotate(1deg); opacity: 0; }
}

8%   { opacity: 0.85; }
  85%  { opacity: 0.7;  }
  100% { opacity: 0;    transform: translateY(110vh)  rotate(380deg) scale(0.75); }
}


/* ===== 固定郁金香装饰 ===== */
.fixed-tulip {
  position: fixed;
  pointer-events: none;
  z-index: 9993;
  opacity: 0.72;
  filter: drop-shadow(0 2px 8px rgba(255,80,160,0.35));
  transition: opacity 0.5s ease;
}
.fixed-tulip:hover { opacity: 0.92; }
/* 四角位置 */
.ft-tl { top: 18px; left: 12px; transform: rotate(-18deg) scaleX(-1); }
.ft-tr { top: 18px; right: 12px; transform: rotate(18deg); }
.ft-bl { bottom: 80px; left: 12px; transform: rotate(8deg) scaleX(-1); }
.ft-br { bottom: 80px; right: 12px; transform: rotate(-8deg); }
/* 中间两侧 */
.ft-ml { top: 45%; left: 8px; transform: rotate(5deg) scaleX(-1); }
.ft-mr { top: 45%; right: 8px; transform: rotate(-5deg); }

@media(max-width:768px){
  .fixed-tulip { opacity: 0.55; }
  .ft-ml,.ft-mr { display: none; }
  .ft-tl,.ft-tr { top:10px; }
  .ft-bl,.ft-br { bottom:70px; }
}

</style>

// ============================================================
// Three.js 3D 场景：旋转粒子星云 + 3D烟花
// ============================================================
(function(){
  if(typeof THREE === 'undefined') return;
  var canvas = document.getElementById('threeCanvas');
  var renderer = new THREE.WebGLRenderer({ canvas:canvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 80);

  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---- 3D 星空粒子 ----
  var starCount = 600;
  var starGeo = new THREE.BufferGeometry();
  var starPos = new Float32Array(starCount*3);
  var starColors = new Float32Array(starCount*3);
  for(var i=0;i<starCount;i++){
    starPos[i*3]   = (Math.random()-0.5)*600;
    starPos[i*3+1] = (Math.random()-0.5)*600;
    starPos[i*3+2] = (Math.random()-0.5)*400;
    // 偏粉偏白，70% 粉色
    var pink = Math.random()<0.7;
    starColors[i*3]   = 1.0;
    starColors[i*3+1] = pink ? 0.45+Math.random()*0.25 : 0.92+Math.random()*0.08;
    starColors[i*3+2] = pink ? 0.65+Math.random()*0.3  : 0.97+Math.random()*0.03;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starColors,3));
  var starMat = new THREE.PointsMaterial({size:0.7, vertexColors:true, transparent:true, opacity:0.85, sizeAttenuation:true});
  var starField = new THREE.Points(starGeo, starMat);
  scene.add(starField);

  // ---- 3D 漂浮爱心粒子云 ----
  var heartCount = 400;
  var heartGeo = new THREE.BufferGeometry();
  var hPos = new Float32Array(heartCount*3);
  var hCol = new Float32Array(heartCount*3);
  var hVel = [];
  for(var j=0;j<heartCount;j++){
    hPos[j*3]   = (Math.random()-0.5)*120;
    hPos[j*3+1] = (Math.random()-0.5)*80;
    hPos[j*3+2] = (Math.random()-0.5)*60;
    hCol[j*3]   = 1.0;
    hCol[j*3+1] = 0.35+Math.random()*0.35;
    hCol[j*3+2] = 0.55+Math.random()*0.4;
    hVel.push({ x:(Math.random()-0.5)*0.02, y:Math.random()*0.015+0.005, z:(Math.random()-0.5)*0.01, phase:Math.random()*Math.PI*2 });
  }
  heartGeo.setAttribute('position', new THREE.BufferAttribute(hPos,3));
  heartGeo.setAttribute('color', new THREE.BufferAttribute(hCol,3));
  var heartMat = new THREE.PointsMaterial({size:2.2, vertexColors:true, transparent:true, opacity:0.7, sizeAttenuation:true});
  var heartCloud = new THREE.Points(heartGeo, heartMat);
  scene.add(heartCloud);

  // ---- 3D 烟花系统 ----
  var fireworkSystems = [];
  var PINK_COLORS = [
    new THREE.Color(1.0, 0.3, 0.8),
    new THREE.Color(1.0, 0.5, 0.9),
    new THREE.Color(1.0, 0.2, 0.6),
    new THREE.Color(1.0, 0.4, 1.0),
    new THREE.Color(1.0, 0.6, 0.95),
    new THREE.Color(1.0, 0.35, 0.75)
  ];

  function createFirework(x, y, z){
    var count = 120;
    var geo = new THREE.BufferGeometry();
    var pos = new Float32Array(count*3);
    var col = new Float32Array(count*3);
    var vel = [];
    var baseColor = PINK_COLORS[Math.floor(Math.random()*PINK_COLORS.length)];
    for(var k=0;k<count;k++){
      pos[k*3]=x; pos[k*3+1]=y; pos[k*3+2]=z;
      var theta = Math.random()*Math.PI*2;
      var phi   = Math.acos(2*Math.random()-1);
      var spd   = Math.random()*0.6+0.2;
      vel.push({ vx:Math.sin(phi)*Math.cos(theta)*spd, vy:Math.sin(phi)*Math.sin(theta)*spd, vz:Math.cos(phi)*spd, gravity:-0.008 });
      var bright = 0.7+Math.random()*0.3;
      col[k*3]  =baseColor.r*bright; col[k*3+1]=baseColor.g*bright; col[k*3+2]=baseColor.b*bright;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
    var mat = new THREE.PointsMaterial({size:1.6, vertexColors:true, transparent:true, opacity:1.0, sizeAttenuation:true});
    var pts = new THREE.Points(geo, mat);
    scene.add(pts);
    fireworkSystems.push({ pts:pts, geo:geo, vel:vel, age:0, maxAge:90 });
  }

  function updateFireworks(){
    fireworkSystems = fireworkSystems.filter(function(fw){
      fw.age++;
      var t = fw.age/fw.maxAge;
      fw.pts.material.opacity = Math.max(0, 1-t*t);
      var pos = fw.geo.attributes.position.array;
      for(var i=0;i<fw.vel.length;i++){
        pos[i*3]   += fw.vel[i].vx * (1-t*0.6);
        pos[i*3+1] += fw.vel[i].vy * (1-t*0.6) + fw.vel[i].gravity * fw.age;
        pos[i*3+2] += fw.vel[i].vz * (1-t*0.6);
      }
      fw.geo.attributes.position.needsUpdate = true;
      if(fw.age >= fw.maxAge){ scene.remove(fw.pts); fw.geo.dispose(); fw.pts.material.dispose(); return false; }
      return true;
    });
  }

  function launchFirework(){
    var x = (Math.random()-0.5)*80;
    var y = 20+Math.random()*30;
    var z = (Math.random()-0.5)*30;
    createFirework(x, y, z);
  }

  // 开场礼炮
  setTimeout(function(){ for(var i=0;i<5;i++){ (function(d){ setTimeout(launchFirework, d); })(i*300); } }, 1800);
  // 周期烟花
  setInterval(function(){ var n=1+Math.floor(Math.random()*2); for(var i=0;i<n;i++){ (function(d){ setTimeout(launchFirework, d); })(i*350); } }, 4000);

  // ---- 点击触发3D烟花 ----
  document.addEventListener('click', function(e){
    if(e.target.id==='music-btn') return;
    var nx = (e.clientX/window.innerWidth)*2-1;
    var ny = -(e.clientY/window.innerHeight)*2+1;
    var x = nx*60, y = ny*35, z = 0;
    for(var i=0;i<3;i++){ (function(d,ox,oy){ setTimeout(function(){ createFirework(x+ox,y+oy,0); },d); })(i*200, (Math.random()-0.5)*10, (Math.random()-0.5)*8); }
  });

  // ---- 渲染循环 ----
  var clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    // 星空缓慢旋转
    starField.rotation.y = t * 0.008;
    starField.rotation.x = Math.sin(t*0.003)*0.05;

    // 爱心粒子漂浮
    var hposArr = heartGeo.attributes.position.array;
    for(var j2=0;j2<heartCount;j2++){
      hposArr[j2*3]   += hVel[j2].x + Math.sin(t*0.4+hVel[j2].phase)*0.003;
      hposArr[j2*3+1] += hVel[j2].y;
      hposArr[j2*3+2] += hVel[j2].z;
      // 超出边界循环
      if(hposArr[j2*3+1] >  45) hposArr[j2*3+1] = -45;
      if(hposArr[j2*3]   >  65) hposArr[j2*3]   = -65;
      if(hposArr[j2*3]   < -65) hposArr[j2*3]   =  65;
    }
    heartGeo.attributes.position.needsUpdate = true;
    heartMat.opacity = 0.5 + 0.2*Math.sin(t*0.8);

    // 相机轻微呼吸
    camera.position.x = Math.sin(t*0.15)*3;
    camera.position.y = Math.sin(t*0.1)*2;
    camera.lookAt(0,0,0);

    updateFireworks();
    renderer.render(scene, camera);
  }
  animate();
})();

// ============================================================
// 弹幕系统
// ============================================================
(function(){
  var container = document.getElementById('danmaku-container');
  var lanes = [8,15,22,30,38,46,54,62,70,78]; // 纵向轨道百分比
  var laneLastTime = lanes.map(function(){ return 0; });

  function getFreeLane(){
    var now = Date.now();
    var best = 0, bestGap = 0;
    for(var i=0;i<lanes.length;i++){
      var gap = now - laneLastTime[i];
      if(gap > bestGap){ bestGap=gap; best=i; }
    }
    return best;
  }

  function launchDanmaku(){
    var text = DANMAKU_LIST[Math.floor(Math.random()*DANMAKU_LIST.length)];
    var laneIdx = getFreeLane();
    laneLastTime[laneIdx] = Date.now();

    var el = document.createElement('div');
    el.className = 'danmaku-item';
    el.textContent = text;
    var top = lanes[laneIdx];
    el.style.top = top + 'vh';
    el.style.left = '100vw';
    var dur = 9 + Math.random()*5;
    el.style.animationDuration = dur + 's';
    // 随机粉色深浅
    var alpha = (0.03 + Math.random()*0.05).toFixed(2);
    el.style.background = 'rgba(255,100,170,'+alpha+')';
    container.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, (dur+0.5)*1000);
  }

  // 主内容显示后才启动弹幕
  function startDanmaku(){
    launchDanmaku();
    setInterval(launchDanmaku, 1800);
    // 开场多发几条
    setTimeout(function(){ for(var i=0;i<3;i++){ (function(d){ setTimeout(launchDanmaku, d); })(i*400); } }, 500);
  }

  // 等开场结束后启动
  var mainContent = document.getElementById('mainContent');
  var obs = new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      if(m.target.classList.contains('visible')){ startDanmaku(); obs.disconnect(); }
    });
  });
  obs.observe(mainContent, { attributes:true, attributeFilter:['class'] });
  // 兜底：8秒后无论如何启动
  setTimeout(startDanmaku, 9000);
})();

// 2D 鼠标跟随爱心（overlayCanvas）
// ============================================================
(function(){
  var canvas = document.getElementById('overlayCanvas');
  var ctx = canvas.getContext('2d');
  var pts = [];
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  document.addEventListener('mousemove', function(e){
    if(pts.length<25){
      pts.push({x:e.clientX,y:e.clientY,s:Math.random()*9+4,a:1,dx:(Math.random()-0.5)*0.6,c:['#ff5cad','#ffb4e0','#ff4db8','#ff99d4'][Math.floor(Math.random()*4)]});
    }
  });
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts = pts.filter(function(p){ return p.a>0; });
    pts.forEach(function(p){
      ctx.save(); ctx.globalAlpha=p.a; ctx.fillStyle=p.c; ctx.font=p.s+'px serif';
      ctx.fillText('❤',p.x-p.s/2,p.y); ctx.restore();
      p.y-=0.9; p.x+=p.dx; p.a-=0.014;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
(function(){
  var canvas = document.getElementById('heartCanvas');
  var ctx = canvas.getContext('2d');
  var opening = document.getElementById('opening');
  var particles = [];
  var phase = 'gather';
  var frame = 0;
  function resize(){ canvas.width=window.innerWidth; canvas.height=Math.min(window.innerHeight*0.6,500); }
  resize(); window.addEventListener('resize', resize);
  function hx(t){ return 16*Math.pow(Math.sin(t),3); }
  function hy(t){ return -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); }
  var pts=[];
  var sc=Math.min(canvas.width,canvas.height)*0.03;
  var cx2=canvas.width/2, cy2=canvas.height/2+20;
  for(var i2=0;i2<300;i2++){ var t2=(i2/300)*Math.PI*2; pts.push({tx:cx2+hx(t2)*sc, ty:cy2+hy(t2)*sc}); }
  pts.forEach(function(hp){
    particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, tx:hp.tx, ty:hp.ty, sz:Math.random()*3+1, h:330+Math.random()*30, s:85, l:60+Math.random()*25, a:Math.random()*0.5+0.5 });
  });
  function animate2(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    particles.forEach(function(p){
      if(phase==='gather'){
        var dx=p.tx-p.x, dy=p.ty-p.y, d=Math.sqrt(dx*dx+dy*dy)+0.001;
        var sp=Math.max(d*0.03,0.5);
        p.x+=(dx/d)*sp; p.y+=(dy/d)*sp;
        p.a=Math.min(1,p.a+0.02);
      } else if(phase==='heart'){
        var pl=1+0.05*Math.sin(frame*0.05);
        p.x=p.tx+(p.tx-cx2)*(pl-1);
        p.y=p.ty+(p.ty-cy2)*(pl-1);
      }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle='hsla('+p.h+','+p.s+'%,'+p.l+'%,'+p.a+')'; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*3,0,Math.PI*2);
      ctx.fillStyle='hsla('+p.h+','+p.s+'%,'+p.l+'%,0.08)'; ctx.fill();
    });
    if(phase==='gather'&&frame>120){ phase='heart'; frame=0; }
    requestAnimationFrame(animate2);
  }
  animate2();
  function enter(){
    if(opening.classList.contains('hidden')) return;
    opening.classList.add('hidden');
    // 开场点击时触发音乐播放
    var audio = document.getElementById('bgm');
    if(audio){
      if(audio.readyState >= 2){
        audio.play().then(function(){
          var btn = document.getElementById('music-btn');
          btn.classList.add('playing');
          btn.textContent = '♪';
          window._musicPlaying = true;
        }).catch(function(){});
      } else {
        // 还没加载好，等待 canplay 事件
        audio.addEventListener('canplay', function onCanPlay(){
          audio.removeEventListener('canplay', onCanPlay);
          audio.play().then(function(){
            var btn = document.getElementById('music-btn');
            btn.classList.add('playing');
            btn.textContent = '♪';
            window._musicPlaying = true;
          }).catch(function(){});
        });
        // 同时触发 load 确保开始加载
        audio.load();
      }
    }
    setTimeout(function(){
      document.getElementById('mainContent').classList.add('visible');
      opening.style.display='none';
    },1400);
  }
  opening.addEventListener('click', enter);
  // setTimeout(enter, 8000); // 移除自动进入，确保手机端用户手势触发音乐
})();

// ============================================================
// 滚动触发 + 打字机效果
// ============================================================
(function(){
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        var wordsEl = entry.target.querySelector('.words');
        if(wordsEl && !wordsEl.dataset.typed){
          wordsEl.dataset.typed='1';
          var fullText = wordsEl.getAttribute('data-words')||'';
          wordsEl.textContent='';
          var idx=0;
          var timer=setInterval(function(){
            if(idx<fullText.length){ wordsEl.textContent+=fullText.charAt(idx); idx++; }
            else clearInterval(timer);
          },60);
        }
      }
    });
  }, {threshold:0.15});
  document.querySelectorAll('.timeline-item,.gallery-item,.ending').forEach(function(el){ observer.observe(el); });
})();

// ============================================================
// 音乐控制
// ============================================================
(function(){
  var btn = document.getElementById('music-btn');
  var audio = document.getElementById('bgm');
  window._musicPlaying = false;

  function tryPlay(){
    if(window._musicPlaying) return;
    audio.play().then(function(){
      window._musicPlaying = true;
      btn.classList.add('playing');
      btn.textContent = '♪';
    }).catch(function(){});
  }

  btn.addEventListener('click', function(e){
    e.stopPropagation();
    if(!audio.currentSrc){
      return;
    }
    if(window._musicPlaying){
      audio.pause(); btn.classList.remove('playing'); btn.textContent='🎵'; window._musicPlaying=false;
    } else {
      tryPlay();
    }
  });

  // 任何触摸/点击都尝试播放（手机兼容）
  function firstInteraction(){
    if(!window._musicPlaying) tryPlay();
  }
  document.addEventListener('touchstart', firstInteraction, {passive:true});
  document.addEventListener('click', firstInteraction, {passive:true, once:true});
})();

// ============================================================
// 灯箱 Lightbox
// ============================================================
(function(){
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCaption = document.getElementById('lbCaption');
  var data = [];  // [{src,caption}]
  var idx = 0;

  // 收集所有可预览图片
  function collect(){
    data = [];
    GALLERY_DATA.forEach(function(d){ data.push({src:d.src,caption:d.caption}); });
    TIMELINE_DATA.forEach(function(d){
      if(d.photo){ data.push({src:d.photo,caption:''}); }
    });
  }
  collect();

  // 打开灯箱
  window.lbOpen = function(src, caption){
    idx = data.findIndex(function(d){ return d.src===src; });
    if(idx<0){ idx=0; data=[{src:src,caption:caption||''}]; }
    lbImg.src = src;
    lbCaption.textContent = caption||'';
    lb.classList.add('active');
    document.body.style.overflow='hidden';
  };

  // 关闭
  window.lbClose = function(){
    lb.classList.remove('active');
    document.body.style.overflow='';
    setTimeout(function(){ lbImg.src=''; },400);
  };

  // 导航
  window.lbNav = function(dir){
    if(data.length<=1) return;
    idx = (idx+dir+data.length)%data.length;
    lbImg.style.opacity=0;
    setTimeout(function(){
      lbImg.src=data[idx].src;
      lbCaption.textContent=data[idx].caption;
      lbImg.style.opacity=1;
    },200);
  };

  // 点击遮罩关闭
  lb.addEventListener('click', function(e){
    if(e.target===lb) window.lbClose();
  });

  // 键盘支持
  document.addEventListener('keydown', function(e){
    if(!lb.classList.contains('active')) return;
    if(e.key==='Escape') window.lbClose();
    if(e.key==='ArrowLeft')  window.lbNav(-1);
    if(e.key==='ArrowRight') window.lbNav(1);
  });

  // 事件委托：处理相册和时间线图片点击
  document.addEventListener('click', function(e){
    // 相册图片点击
    var gi = e.target.closest('.gallery-item');
    if(gi){
      var img = gi.querySelector('img');
      if(img) window.lbOpen(img.getAttribute('src'), gi.querySelector('.caption')?gi.querySelector('.caption').textContent:'');
      return;
    }
    // 时间线图片点击
    var tp = e.target.closest('.timeline-card .photo');
    if(tp){
      var img2 = tp.querySelector('img');
      if(img2){
        var words = tp.closest('.timeline-item')?tp.closest('.timeline-item').querySelector('.words'):null;
        window.lbOpen(img2.getAttribute('src'), words?words.textContent:'');
      }
      return;
    }
  });
})();
</script>

<script>
// ===== 气球系统 =====
(function(){
  var colors = [
    'rgba(255,100,180,0.82)','rgba(255,150,210,0.80)','rgba(220,80,200,0.78)',
    'rgba(255,180,230,0.75)','rgba(255,120,160,0.82)','rgba(200,100,220,0.78)'
  ];
  function launchBalloon(){
    var el = document.createElement('div');
    el.className = 'balloon';
    var left  = 5 + Math.random() * 90;
    var size  = 28 + Math.random() * 26;
    var dur   = 8 + Math.random() * 6;
    var color = colors[Math.floor(Math.random() * colors.length)];
    el.style.cssText = [
      'left:' + left + 'vw',
      'width:' + size + 'px',
      'height:' + (size * 1.28) + 'px',
      'background:' + color,
      'box-shadow:inset -4px -4px 10px rgba(0,0,0,0.1),2px 2px 8px ' + color.replace(/[\d.]+\)$/, '0.3)'),
      'animation-duration:' + dur + 's'
    ].join(';');
    document.body.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, (dur+1)*1000);
  }
  setTimeout(function(){
    launchBalloon();
    setInterval(launchBalloon, 2800);
    for(var i=1;i<=4;i++){ (function(d){ setTimeout(launchBalloon,d); })(i*600); }
  }, 1800);
})();

</script>
